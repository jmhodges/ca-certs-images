name: build

# Build every Dockerfile on pull requests (no push) and build + push the
# resulting multi-arch images to Docker Hub on pushes to main.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    # contents: read to checkout; id-token: write so cosign can mint a
    # short-lived OIDC token for keyless signing (only used on push to main).
    permissions:
      contents: read
      id-token: write
    # Use the docker-pusher environment (which holds DOCKERHUB_USERNAME and
    # DOCKERHUB_TOKEN) only when we actually push, i.e. on pushes to main.
    # Pull request runs build-only and get no environment / secrets.
    environment: ${{ github.event_name != 'pull_request' && 'docker-pusher' || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - dir: debian-12
            tags: |
              cacertsfriend/ca-certs-images:debian-12
              cacertsfriend/ca-certs-images:bookworm
          - dir: debian-13
            tags: |
              cacertsfriend/ca-certs-images:debian-13
              cacertsfriend/ca-certs-images:trixie
          - dir: debian-forky
            tags: |
              cacertsfriend/ca-certs-images:debian-forky
              cacertsfriend/ca-certs-images:forky
              cacertsfriend/ca-certs-images:testing
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Only log in when we are going to push (pushes to main). Pull request
      # runs build-only and must not need access to secrets.
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ./${{ matrix.dir }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ matrix.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # SLSA provenance + SBOM attestations, attached to the image we push.
          provenance: ${{ github.event_name != 'pull_request' && 'mode=max' || 'false' }}
          sbom: ${{ github.event_name != 'pull_request' }}

      # Keyless (Sigstore/Fulcio/Rekor) signature over the pushed multi-arch
      # index digest, using the job's OIDC identity. No long-lived keys.
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - name: Sign the pushed image by digest
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "cacertsfriend/ca-certs-images@${DIGEST}"

  # Single check that succeeds only when every matrix build succeeded. Make
  # this the required status check on branch protection so adding or removing
  # Dockerfiles from the matrix never changes which check must pass. Any new
  # must-pass job belongs in this job's `needs:` list (not as a second
  # required check) so this stays the one gate.
  build-all:
    if: always()
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check matrix build results
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "One or more matrix builds did not succeed: ${{ needs.build.result }}"
            exit 1
          fi
          echo "All matrix builds succeeded."
