name: build

# Build every Dockerfile on pull requests (no push) and build + push the
# resulting multi-arch images to Docker Hub on pushes to main.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    # Use the docker-pusher environment (which holds DOCKERHUB_USERNAME and
    # DOCKERHUB_TOKEN) only when we actually push, i.e. on pushes to main.
    # Pull request runs build-only and get no environment / secrets.
    environment: ${{ github.event_name != 'pull_request' && 'docker-pusher' || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - dir: debian-12
            tags: |
              cacertsfriend/ca-certs-images:debian-12
              cacertsfriend/ca-certs-images:bookworm
          - dir: debian-13
            tags: |
              cacertsfriend/ca-certs-images:debian-13
              cacertsfriend/ca-certs-images:trixie
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only log in when we are going to push (pushes to main). Pull request
      # runs build-only and must not need access to secrets.
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.dir }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ matrix.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
