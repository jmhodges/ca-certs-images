name: build

# Build every Dockerfile on pull requests (no push) and build + push the
# resulting multi-arch images to Docker Hub on pushes to main.
#
# On pushes to main we only push (and sign/attest) the images whose inputs
# actually changed: a commit that only touches a README or an unrelated
# directory will rebuild for verification but will NOT republish an image.
# Pull requests always build every image so the required `build-all` check
# stays a stable, always-reporting gate regardless of what changed.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded pull request runs, but never cancel a push to main:
  # the push and the cosign sign step run separately, so a mid-run cancel
  # could leave an image published to Docker Hub but unsigned.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    # contents: read to checkout; id-token: write so cosign can mint a
    # short-lived OIDC token for keyless signing (only used on push to main).
    permissions:
      contents: read
      id-token: write
    # Use the docker-pusher environment (which holds DOCKERHUB_USERNAME and
    # DOCKERHUB_TOKEN) only when we actually push, i.e. on pushes to main.
    # Pull request runs build-only and get no environment / secrets.
    environment: ${{ github.event_name != 'pull_request' && 'docker-pusher' || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - dir: debian-12
            tags: |
              cacertsfriend/ca-certs-images:debian-12
              cacertsfriend/ca-certs-images:bookworm
          - dir: debian-13
            tags: |
              cacertsfriend/ca-certs-images:debian-13
              cacertsfriend/ca-certs-images:trixie
          - dir: debian-forky
            tags: |
              cacertsfriend/ca-certs-images:debian-forky
              cacertsfriend/ca-certs-images:forky
              cacertsfriend/ca-certs-images:testing
    steps:
      - name: Checkout
        # fetch-depth: 0 so the push-decision step below can diff the full
        # push range (github.event.before..github.sha).
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Decide whether this matrix image should be pushed. Pull requests never
      # push. On main we push only when files under this image's directory --
      # or this workflow itself -- changed in the pushed range.
      - name: Decide whether to push this image
        id: decide
        env:
          DIR: ${{ matrix.dir }}
          EVENT: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT" = "pull_request" ]; then
            echo "Pull request: build only, no push."
            echo "push=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base="$BEFORE"
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            base="${SHA}^"
          fi
          pattern="^(${DIR}/|\.github/workflows/build\.yml$)"
          if git diff --name-only "$base" "$SHA" | grep -Eq "$pattern"; then
            echo "$DIR (or the build workflow) changed since $base: will push."
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "$DIR unchanged since $base: skipping push."
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      # Only log in when we are going to push (pushes to main). Pull request
      # runs build-only and must not need access to secrets.
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./${{ matrix.dir }}
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.decide.outputs.push == 'true' }}
          tags: ${{ matrix.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # SLSA provenance + SBOM attestations, attached to the image we push.
          provenance: ${{ steps.decide.outputs.push == 'true' && 'mode=max' || 'false' }}
          sbom: ${{ steps.decide.outputs.push == 'true' }}

      # Keyless (Sigstore/Fulcio/Rekor) signature over the pushed multi-arch
      # index digest, using the job's OIDC identity. No long-lived keys.
      - name: Install cosign
        if: steps.decide.outputs.push == 'true'
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - name: Sign the pushed image by digest
        if: steps.decide.outputs.push == 'true'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "cacertsfriend/ca-certs-images@${DIGEST}"

  # Sync the Docker Hub repository overview from docs/dockerhub/overview.md.
  # Runs only on pushes to main (the description is repo-wide, so it lives in
  # its own job rather than the per-tag build matrix). Uses the docker-pusher
  # environment for the Docker Hub credentials.
  push-dockerhub-docs:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: docker-pusher
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Sync Docker Hub description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: cacertsfriend/ca-certs-images
          readme-filepath: ./docs/dockerhub/overview.md
          short-description: "Debian base images with ca-certificates pre-installed"

  # Single check that succeeds only when every matrix build succeeded. Make
  # this the required status check on branch protection so adding or removing
  # Dockerfiles from the matrix never changes which check must pass. Any new
  # must-pass job belongs in this job's `needs:` list (not as a second
  # required check) so this stays the one gate.
  build-all:
    if: always()
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check matrix build results
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "One or more matrix builds did not succeed: ${{ needs.build.result }}"
            exit 1
          fi
          echo "All matrix builds succeeded."
