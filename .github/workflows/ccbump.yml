name: ccbump

# Keep each Dockerfile's pinned ca-certificates version fresh. ccbump runs the
# pinned base image, reads the latest ca-certificates available at a current
# snapshot.debian.org timestamp, and opens (or updates) a per-Dockerfile,
# auto-merging PR when a newer version exists. The bump PR is gated by the
# `build` workflow, which proves the new pin builds on both arches before
# auto-merge lands it.
on:
  schedule:
    # Daily at 06:17 UTC. ca-certificates changes rarely; a no-op run is cheap.
    - cron: "17 6 * * *"
  workflow_dispatch:

concurrency:
  group: ccbump
  cancel-in-progress: false

permissions: {}

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      # Mint a GitHub App installation token. The bump PRs must be created with
      # this token (not the default GITHUB_TOKEN) so they trigger the `build`
      # workflow that gates auto-merge.
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so origin/main and any existing origin/ccbump/* branches
          # are available for ccbump's diff and idempotency checks. The app token
          # is persisted as the push credential.
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: tools/ccbump/go.mod
          cache: false

      - name: Run ccbump
        working-directory: tools/ccbump
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: go run . -repo-root "$GITHUB_WORKSPACE"
